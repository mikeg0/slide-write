<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Slide Write</title>
  <style>
    body { font-family: system-ui, sans-serif; width: 280px; margin: 0; padding: 14px; color: #1c1c28; }
    h1 { font-size: 14px; margin: 0 0 8px; }
    .origin { font-size: 12px; color: #555; word-break: break-all; margin-bottom: 10px; }
    label { font-size: 13px; display: flex; align-items: center; gap: 6px; }
    input[type=password] { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; font: inherit; margin: 6px 0; }
    button { width: 100%; padding: 7px; border: 1px solid #4646a0; border-radius: 6px; background: #4646a0; color: #fff; cursor: pointer; font: inherit; }
    .status { font-size: 12px; margin-top: 10px; min-height: 16px; }
    .ok { color: #2a7a2a; } .err { color: #a02a2a; }
    .link { font-size: 12px; margin-top: 10px; display: block; color: #4646a0; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Slide Write</h1>
  <div class="origin" id="origin">—</div>
  <label><input type="checkbox" id="enabled" /> enabled on this origin</label>
  <input type="password" id="token" placeholder="token" />
  <button id="save">Save &amp; check</button>
  <div class="status" id="status"></div>
  <a class="link" id="options">Open full options →</a>
  <script src="popup.js"></script>
</body>
</html>
